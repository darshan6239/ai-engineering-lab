<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox Ops — Email Automation Control Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1220; --surface:#111A2B; --surface-alt:#18233A; --border:#26334D;
    --text:#E8ECF4; --muted:#8B97AF; --muted-dim:#5C6884;
    --amber:#F2A93B; --green:#3DDC97; --red:#F2555A; --blue:#5B9DF9;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.mono-head{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}

  header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(11,18,32,.92);backdrop-filter:blur(6px);z-index:10;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);}
  .brand h1{font-size:18px;margin:0;letter-spacing:.2px;}
  .brand span.tag{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;margin-left:6px;}
  .health{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);}
  .health .pill{padding:4px 10px;border-radius:99px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;}
  .pill.ok{color:var(--green);border-color:rgba(61,220,151,.35);}
  .pill.bad{color:var(--red);border-color:rgba(242,85,90,.35);}
  button.run{background:var(--amber);color:#1b1200;border:none;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:transform .1s ease, opacity .15s ease;}
  button.run:hover{opacity:.9;}
  button.run:active{transform:scale(.97);}
  button.run:disabled{opacity:.4;cursor:not-allowed;}

  main{max-width:1240px;margin:0 auto;padding:28px;}

  .stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:26px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .stat .n{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:600;}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
  .stat.amber .n{color:var(--amber);} .stat.green .n{color:var(--green);}
  .stat.red .n{color:var(--red);} .stat.blue .n{color:var(--blue);}

  .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;margin-bottom:24px;}
  @media (max-width:940px){.grid{grid-template-columns:1fr;} .stats-row{grid-template-columns:repeat(3,1fr);}}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
  .card h2{font-size:14px;margin:0 0 14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}

  /* pipeline diagram */
  .pipeline{display:flex;flex-direction:column;gap:6px;}
  .stage{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface-alt);position:relative;}
  .stage .idx{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-dim);width:16px;}
  .stage .name{flex:1;font-size:13px;}
  .stage .count{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:6px;}
  .stage.active{border-color:var(--amber);box-shadow:0 0 0 1px rgba(242,169,59,.25), 0 0 18px rgba(242,169,59,.12) inset;}
  .stage-arrow{align-self:center;color:var(--muted-dim);font-size:11px;padding-left:22px;}

  /* queue list */
  .queue{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow:auto;}
  .item{border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:var(--surface-alt);}
  .item .row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .item .subject{font-size:13.5px;font-weight:500;}
  .item .from{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
  .badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:99px;white-space:nowrap;}
  .badge.draft_created{background:rgba(242,169,59,.15);color:var(--amber);}
  .badge.sent{background:rgba(61,220,151,.15);color:var(--green);}
  .badge.failed{background:rgba(242,85,90,.15);color:var(--red);}
  .badge.rejected{background:rgba(139,151,175,.15);color:var(--muted);}
  .badge.skipped{background:rgba(139,151,175,.15);color:var(--muted);}
  .badge.queued, .badge.processing, .badge.drafting{background:rgba(91,157,249,.15);color:var(--blue);}
  .draft-body{font-size:12.5px;color:var(--muted);margin-top:8px;white-space:pre-wrap;max-height:120px;overflow:auto;border-top:1px dashed var(--border);padding-top:8px;}
  .actions{display:flex;gap:8px;margin-top:10px;}
  .actions button{flex:1;border:1px solid var(--border);background:var(--bg);color:var(--text);padding:7px 0;border-radius:6px;font-size:12px;cursor:pointer;}
  .actions button.send{color:var(--green);border-color:rgba(61,220,151,.3);}
  .actions button.reject{color:var(--red);border-color:rgba(242,85,90,.3);}
  .actions button:hover{filter:brightness(1.2);}
  .empty{color:var(--muted-dim);font-size:12.5px;padding:20px 0;text-align:center;}

  /* full table */
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{text-align:left;color:var(--muted);font-weight:500;text-transform:uppercase;font-size:10.5px;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--border);}
  td{padding:9px 10px;border-bottom:1px solid var(--border);}
  tr:hover td{background:var(--surface-alt);}
  .filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .filters button{background:var(--surface-alt);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:99px;font-size:11.5px;cursor:pointer;}
  .filters button.active{color:var(--text);border-color:var(--amber);}

  footer{color:var(--muted-dim);font-size:11px;text-align:center;padding:24px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot" id="live-dot"></span>
    <h1>Inbox Ops<span class="tag">/ email-automation</span></h1>
  </div>
  <div class="health">
    <span class="pill mono" id="model-pill">loading…</span>
    <span class="pill" id="health-pill">checking…</span>
    <button class="run" id="run-btn" onclick="triggerRun()">Run inbox pass</button>
  </div>
</header>

<main>

  <div class="stats-row" id="stats-row"></div>

  <div class="grid">
    <div class="card">
      <h2>Pipeline</h2>
      <div class="pipeline" id="pipeline"></div>
    </div>

    <div class="card">
      <h2>Awaiting your approval</h2>
      <div class="queue" id="approval-queue"><div class="empty">Loading…</div></div>
    </div>
  </div>

  <div class="card">
    <h2>All processed emails</h2>
    <div class="filters" id="filters"></div>
    <table>
      <thead><tr><th>Subject</th><th>Sender</th><th>Category</th><th>Status</th><th>Trials</th><th>Updated</th></tr></thead>
      <tbody id="all-emails"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>

</main>

<footer>Polling every 4s · SQLite-backed · qwen2.5:1.5b routes, llama-3.3-70b writes, nomic-embed-text retrieves</footer>

<script>
const STAGES = [
  {key:'queued', name:'Loaded from Gmail'},
  {key:'processing', name:'Categorizing (qwen2.5:1.5b)'},
  {key:'drafting', name:'RAG + drafting (llama-3.3-70b)'},
  {key:'draft_created', name:'Draft ready — awaiting approval'},
  {key:'sent', name:'Sent'},
];
let currentFilter = null;

function timeAgo(ts){
  if(!ts) return '—';
  const s = Math.floor(Date.now()/1000 - ts);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function esc(s){return (s||'').toString().replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

async function refreshHealth(){
  try{
    const h = await fetch('/api/health').then(r=>r.json());
    const pill = document.getElementById('health-pill');
    pill.textContent = h.ok ? 'all systems nominal' : 'needs attention';
    pill.className = 'pill ' + (h.ok ? 'ok' : 'bad');
    document.getElementById('model-pill').textContent = `${h.ollama_llm_model} + ${h.groq_model}`;
  }catch(e){
    document.getElementById('health-pill').textContent = 'unreachable';
    document.getElementById('health-pill').className = 'pill bad';
  }
}

async function refreshRunStatus(){
  const s = await fetch('/api/run/status').then(r=>r.json());
  const btn = document.getElementById('run-btn');
  const dot = document.getElementById('live-dot');
  btn.disabled = s.running;
  btn.textContent = s.running ? 'Running…' : 'Run inbox pass';
  dot.style.background = s.running ? 'var(--amber)' : 'var(--green)';
  dot.style.boxShadow = s.running ? '0 0 10px var(--amber)' : '0 0 10px var(--green)';
}

async function triggerRun(){
  try{ await fetch('/api/run', {method:'POST'}); }catch(e){}
  refreshRunStatus();
}

async function refreshStats(){
  const s = await fetch('/api/stats').then(r=>r.json());
  const byStatus = s.by_status || {};
  const cards = [
    {label:'Total processed', value:s.total, cls:''},
    {label:'Queued', value: byStatus.queued||0, cls:'blue'},
    {label:'In progress', value:(byStatus.processing||0)+(byStatus.drafting||0), cls:'blue'},
    {label:'Awaiting approval', value: byStatus.draft_created||0, cls:'amber'},
    {label:'Sent', value: byStatus.sent||0, cls:'green'},
    {label:'Failed', value: byStatus.failed||0, cls:'red'},
  ];
  document.getElementById('stats-row').innerHTML = cards.map(c=>
    `<div class="stat ${c.cls}"><div class="n">${c.value}</div><div class="l">${c.label}</div></div>`
  ).join('');

  // pipeline stage highlight: light up the earliest stage with pending items
  const activeStage = STAGES.find(st => (byStatus[st.key]||0) > 0 && st.key !== 'sent') || STAGES[STAGES.length-1];
  document.getElementById('pipeline').innerHTML = STAGES.map((st,i)=>
    `<div class="stage ${st.key===activeStage.key ? 'active':''}">
       <span class="idx">${String(i+1).padStart(2,'0')}</span>
       <span class="name">${st.name}</span>
       <span class="count mono">${byStatus[st.key]||0}</span>
     </div>`
  ).join('');
}

async function refreshApprovalQueue(){
  const emails = await fetch('/api/emails?status=draft_created&limit=25').then(r=>r.json());
  const el = document.getElementById('approval-queue');
  if(!emails.length){ el.innerHTML = '<div class="empty">Nothing waiting on you right now.</div>'; return; }
  el.innerHTML = emails.map(e => `
    <div class="item" id="item-${e.id}">
      <div class="row">
        <div>
          <div class="subject">${esc(e.subject || '(no subject)')}</div>
          <div class="from">${esc(e.sender)} · ${esc(e.category||'')}</div>
        </div>
        <span class="badge draft_created">draft</span>
      </div>
      <div class="draft-body">${esc(e.generated_email || '')}</div>
      <div class="actions">
        <button class="send" onclick="act('${e.id}','send')">Send</button>
        <button class="reject" onclick="act('${e.id}','reject')">Discard</button>
      </div>
    </div>
  `).join('');
}

async function act(id, action){
  const res = await fetch(`/api/emails/${id}/${action}`, {method:'POST'});
  if(!res.ok){ const j = await res.json().catch(()=>({detail:'failed'})); alert(j.detail || 'Action failed'); }
  refreshApprovalQueue(); refreshStats(); refreshTable();
}

async function refreshTable(){
  const emails = await fetch('/api/emails' + (currentFilter?`?status=${currentFilter}`:'') + '&limit=200').then(r=>r.json());
  const statuses = ['queued','processing','drafting','draft_created','sent','failed','rejected','skipped'];
  document.getElementById('filters').innerHTML = ['all',...statuses].map(s =>
    `<button class="${(s==='all'&&!currentFilter)||s===currentFilter?'active':''}" onclick="setFilter('${s==='all'?'':s}')">${s}</button>`
  ).join('');

  const body = document.getElementById('all-emails');
  if(!emails.length){ body.innerHTML = '<tr><td colspan="6" class="empty">No emails yet — click "Run inbox pass".</td></tr>'; return; }
  body.innerHTML = emails.map(e => `
    <tr>
      <td>${esc(e.subject || '(no subject)')}</td>
      <td class="mono">${esc(e.sender)}</td>
      <td>${esc(e.category||'—')}</td>
      <td><span class="badge ${e.status}">${e.status}</span></td>
      <td class="mono">${e.trials||0}</td>
      <td class="mono">${timeAgo(e.updated_at)}</td>
    </tr>
  `).join('');
}

function setFilter(s){ currentFilter = s || null; refreshTable(); }

async function tick(){
  await Promise.all([refreshHealth(), refreshRunStatus(), refreshStats(), refreshApprovalQueue(), refreshTable()]);
}
tick();
setInterval(tick, 4000);
</script>
</body>
</html>
