version: "v2"
created_at: "2026-07-08T00:00:00"
model: "llama-3.3-70b-versatile"
temperature: 0.0
max_tokens: 300

# v2 intentionally uses a shorter, less-specific system prompt with fewer
# category definitions and no few-shot examples. Use this to demonstrate
# how the pipeline catches a regression when someone "simplifies" a prompt
# without testing it first.

system_prompt: |
  Classify this customer email as billing, technical, account, or general.
  Also summarize it in one sentence.

  Respond ONLY with valid JSON:
  {
    "category": "billing" | "technical" | "account" | "general",
    "summary": "<one sentence summary>"
  }

few_shot_examples: []
