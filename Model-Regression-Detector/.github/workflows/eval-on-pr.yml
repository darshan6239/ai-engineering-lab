name: Model Eval on Prompt Change

on:
  pull_request:
    paths:
      - 'prompts/**'
      - 'golden_dataset/**'

jobs:
  run-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py --prompt-version v2

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/output/latest.html

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = 'Eval pipeline ran. See the uploaded report artifact for full details.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Model Eval Results\n${summary}`
            });
